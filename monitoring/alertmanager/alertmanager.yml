global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 5s
      repeat_interval: 30m
      
    # AI/ML alerts
    - match:
        team: ai
      receiver: ai-team
      group_wait: 30s
      repeat_interval: 2h
      
    # Database alerts
    - match:
        team: database
      receiver: database-team
      group_wait: 15s
      repeat_interval: 1h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'https://n8n.xplaincrypto.ai/webhook/alert'
        send_resolved: true
        title: '[DEV] XplainCrypto Alert - {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'https://n8n.xplaincrypto.ai/webhook/critical-alert'
        send_resolved: true
        title: '[CRITICAL DEV] {{ .GroupLabels.alertname }}'

  - name: 'ai-team'
    webhook_configs:
      - url: 'https://n8n.xplaincrypto.ai/webhook/ai-alert'
        send_resolved: true
        title: '[AI DEV] {{ .GroupLabels.alertname }}'

  - name: 'database-team'
    webhook_configs:
      - url: 'https://n8n.xplaincrypto.ai/webhook/database-alert'
        send_resolved: true
        title: '[DATABASE DEV] {{ .GroupLabels.alertname }}'

inhibit_rules:
  # Don't send warnings if critical alert is already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # If a service is down, don't send performance alerts
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*(High|Slow).*'
    equal: ['instance']
