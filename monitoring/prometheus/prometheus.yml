global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'xplaincrypto-production'
    env: 'production'
    phase: 'phase1-monitoring'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # System Monitoring
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    metrics_path: /metrics

  # Redis Monitoring
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
  
  # Database Monitoring - ALL THREE DATABASES
  - job_name: 'postgres-crypto'
    static_configs:
      - targets: ['postgres-exporter-crypto:9187']
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'crypto-database'

  - job_name: 'postgres-users'
    static_configs:
      - targets: ['postgres-exporter-users:9188']
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'users-database'

  - job_name: 'postgres-fastapi'
    static_configs:
      - targets: ['postgres-exporter-fastapi:9189']
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fastapi-database'

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ===================
  # MINDSDB AI MONITORING
  # ===================
  
  - job_name: 'mindsdb-health'
    static_configs:
      - targets: ['142.93.49.20:47334']
    metrics_path: '/api/health'
    scrape_interval: 30s
    scrape_timeout: 15s
    params:
      format: ['prometheus']

  - job_name: 'mindsdb-agents'
    static_configs:
      - targets: ['142.93.49.20:47334']
    metrics_path: '/api/models'
    scrape_interval: 60s
    scrape_timeout: 30s
    params:
      format: ['prometheus']

  # ===================
  # N8N WORKFLOW MONITORING
  # ===================
  
  - job_name: 'n8n-server'
    static_configs:
      - targets: ['206.81.0.227:5678']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 15s
    basic_auth:
      username: 'admin'
      password: 'n8n_secure_password_2024'

  - job_name: 'n8n-workflow-metrics'
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 15s
    honor_labels: true
    metrics_path: '/metrics'
    params:
      match[]: ['{job=~"n8n-.*"}']

  # ===================
  # XPLAINCRYPTO PLATFORM
  # ===================
  
  - job_name: 'xplaincrypto-platform'
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 30s
    honor_labels: true
    metrics_path: '/metrics'
    params:
      match[]: ['{job="xplaincrypto-platform"}']

  # ===================
  # PUSHGATEWAY
  # ===================
  
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 15s
    honor_labels: true

  # ===================
  # LOKI LOGS
  # ===================
  
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: '/metrics'
    scrape_interval: 30s 