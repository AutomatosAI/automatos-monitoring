groups:
  - name: database-alerts
    rules:
      # Database Down Alerts
      - alert: PostgreSQLDown
        expr: up{job=~"postgres-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database {{ $labels.instance }} is down"
          description: "PostgreSQL database {{ $labels.instance }} has been down for more than 1 minute"

      # High Connection Count
      - alert: PostgreSQLHighConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High connection count on {{ $labels.instance }}"
          description: "Database {{ $labels.instance }} has {{ $value }} connections (threshold: 80)"

      # Database Size Growth
      - alert: PostgreSQLDatabaseSizeGrowth
        expr: increase(pg_database_size_bytes[1h]) > 1e9  # 1GB growth per hour
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Rapid database growth on {{ $labels.instance }}"
          description: "Database {{ $labels.instance }} has grown by {{ $value | humanize1024 }}B in the last hour"

      # Slow Queries
      - alert: PostgreSQLSlowQueries
        expr: pg_stat_activity_max_tx_duration > 300  # 5 minutes
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Long running query on {{ $labels.instance }}"
          description: "Query running for {{ $value }}s on {{ $labels.instance }}"

  - name: redis-alerts
    rules:
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value }}%" 