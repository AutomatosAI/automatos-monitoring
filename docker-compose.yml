# Automatos Monitoring Stack — Local Development
# For Railway, each service deploys from services/<name>/Dockerfile

services:
  # ─────────────────────────────────────────────
  # Metrics Collection
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: automatos_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./services/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - automatos_network
      - monitoring_internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Dashboards & Visualisation
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: automatos_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-automatos-dev}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3030}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/platform-overview.json
    volumes:
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_internal
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Log Aggregation
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: automatos_loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./services/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - monitoring_internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Log Relay (Railway Log Drain → Loki)
  # ─────────────────────────────────────────────
  log-relay:
    build:
      context: ./services/log-relay
      dockerfile: Dockerfile
    container_name: automatos_log_relay
    restart: unless-stopped
    ports:
      - "${LOG_RELAY_PORT:-3200}:8080"
    environment:
      - LOKI_PUSH_URL=http://loki:3100/loki/api/v1/push
      - LOG_RELAY_SECRET=${LOG_RELAY_SECRET:-dev-secret}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    networks:
      - monitoring_internal
    depends_on:
      loki:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Alert Routing
  # ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: automatos_alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./services/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets/ingest-token:/etc/alertmanager/secrets/ingest-token:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - automatos_network
      - monitoring_internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # Exporters
  # ─────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: automatos_postgres_exporter
    restart: unless-stopped
    ports:
      - "${PG_EXPORTER_PORT:-9187}:9187"
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_CONNECTION_STRING:-postgresql://postgres:postgres@postgres:5432/orchestrator_db?sslmode=disable}
    networks:
      - automatos_network
      - monitoring_internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: automatos_redis_exporter
    restart: unless-stopped
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    environment:
      - REDIS_ADDR=redis://default:${REDIS_PASSWORD:-redis}@redis:6379
    networks:
      - automatos_network
      - monitoring_internal

networks:
  automatos_network:
    external: true
  monitoring_internal:
    driver: bridge

volumes:
  prometheus_data:
    name: automatos_prometheus_data
  grafana_data:
    name: automatos_grafana_data
  loki_data:
    name: automatos_loki_data
  alertmanager_data:
    name: automatos_alertmanager_data
