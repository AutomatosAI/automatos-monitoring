services:
  # ====================
  # DATABASE SERVICES
  # ====================
  postgres-crypto:
    image: postgres:15
    container_name: xplaincrypto-postgres-crypto
    environment:
      POSTGRES_DB: crypto_data
      POSTGRES_USER: mindsdb
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_crypto_password
    secrets:
      - postgres_crypto_password
    volumes:
      - postgres_crypto_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsdb -d crypto_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-users:
    image: postgres:15
    container_name: xplaincrypto-postgres-users
    environment:
      POSTGRES_DB: user_data
      POSTGRES_USER: xplaincrypto
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_users_password
    secrets:
      - postgres_users_password
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xplaincrypto -d user_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-fastapi:
    image: postgres:15
    container_name: xplaincrypto-postgres-fastapi
    environment:
      POSTGRES_DB: operational_data
      POSTGRES_USER: fastapi
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_fastapi_password
    secrets:
      - postgres_fastapi_password
    volumes:
      - postgres_fastapi_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastapi -d operational_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Database Exporters
  postgres-exporter-crypto:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-crypto
    environment:
      DATA_SOURCE_NAME_FILE: /run/secrets/postgres_crypto_dsn
    secrets:
      - postgres_crypto_dsn
    ports:
      - "9187:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-crypto
    restart: unless-stopped

  postgres-exporter-users:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-users
    environment:
      DATA_SOURCE_NAME_FILE: /run/secrets/postgres_users_dsn
    secrets:
      - postgres_users_dsn
    ports:
      - "9188:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-users
    restart: unless-stopped

  postgres-exporter-fastapi:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-fastapi
    environment:
      DATA_SOURCE_NAME_FILE: /run/secrets/postgres_fastapi_dsn
    secrets:
      - postgres_fastapi_dsn
    ports:
      - "9189:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-fastapi
    restart: unless-stopped

  # ====================
  # CACHE & STORAGE SERVICES
  # ====================
  redis:
    image: redis:7-alpine
    container_name: xplaincrypto-redis
    command: sh -c 'redis-server --requirepass "$$(cat /run/secrets/redis_password)"'
    secrets:
      - redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_secure_pass_dev123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xplaincrypto_network
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: xplaincrypto-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets:
      - redis_password
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - xplaincrypto_network

  # ====================
  # MONITORING SERVICES
  # ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: xplaincrypto-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - xplaincrypto_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: xplaincrypto-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_ADMIN_PASSWORD: grafana_secure_pass_123  # Fallback
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - redis
    networks:
      - xplaincrypto_network
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 3
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: xplaincrypto-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - xplaincrypto_network
    restart: unless-stopped

  loki: 
    image: grafana/loki:latest 
    container_name: xplaincrypto-loki 
    ports: 
      - "3100:3100" 
    volumes: 
      - loki-data:/loki 
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml 
    command: -config.file=/etc/loki/local-config.yaml 
    networks: 
      - monitoring 
    restart: unless-stopped 

  # ====================
  # INFRASTRUCTURE SERVICES
  # ====================
  nginx:
    image: nginx:alpine
    container_name: xplaincrypto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grafana
      - prometheus
      - alertmanager
    networks:
      - xplaincrypto_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: xplaincrypto-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - xplaincrypto_network

  # ====================
# SECRETS CONFIGURATION
  # ====================
secrets:
  # Database passwords
  postgres_crypto_password:
    file: /opt/secrets/xplaincrypto/postgres_crypto_password.txt
  postgres_users_password:
    file: /opt/secrets/xplaincrypto/postgres_users_password.txt
  postgres_fastapi_password:
    file: /opt/secrets/xplaincrypto/postgres_fastapi_password.txt
  
  # Redis password
  redis_password:
    file: /opt/secrets/xplaincrypto/redis_password.txt
  
  # Database connection strings for exporters
  postgres_crypto_dsn:
    file: /opt/secrets/xplaincrypto/postgres_crypto_dsn.txt
  postgres_users_dsn:
    file: /opt/secrets/xplaincrypto/postgres_users_dsn.txt
  postgres_fastapi_dsn:
    file: /opt/secrets/xplaincrypto/postgres_fastapi_dsn.txt
  
  # Application passwords
  grafana_admin_password:
    file: /opt/secrets/xplaincrypto/grafana_admin_password.txt

# ====================
# VOLUMES - SINGLE DEFINITION
# ====================
volumes:
  # Database Data
  postgres_crypto_data:
    driver: local
  postgres_users_data:
    driver: local
  postgres_fastapi_data:
    driver: local
      
  # Application Data
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  loki-data:
    driver: local

# ====================
# NETWORKS - SINGLE DEFINITION
# ====================
networks:
  xplaincrypto_network:
    external: true 
  monitoring:
    external: true 
    