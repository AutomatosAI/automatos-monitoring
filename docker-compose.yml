version: '3.8'

networks:
  xplaincrypto_network:
    external: true

volumes:
  # Database volumes
  postgres_crypto_data:
  postgres_users_data:
  postgres_fastapi_data:
  # ... existing monitoring volumes

services:
  # ====================
  # DATABASE SERVICES
  # ====================
  postgres-crypto:
    image: postgres:15
    container_name: xplaincrypto-postgres-crypto
    environment:
      POSTGRES_DB: crypto_data
      POSTGRES_USER: mindsdb
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_crypto_password
    secrets:
      - postgres_crypto_password
    volumes:
      - postgres_crypto_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsdb -d crypto_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-users:
    image: postgres:15
    container_name: xplaincrypto-postgres-users
    environment:
      POSTGRES_DB: user_data
      POSTGRES_USER: xplaincrypto
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_users_password
    secrets:
      - postgres_users_password
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xplaincrypto -d user_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres-fastapi:
    image: postgres:15
    container_name: xplaincrypto-postgres-fastapi
    environment:
      POSTGRES_DB: operational_data
      POSTGRES_USER: fastapi
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_fastapi_password
    secrets:
      - postgres_fastapi_password
    volumes:
      - postgres_fastapi_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - xplaincrypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastapi -d operational_data"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Database Exporters
  postgres-exporter-crypto:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-crypto
    environment:
      DATA_SOURCE_NAME: "postgresql://mindsdb:QmTJL6k24h7R3zK9p8wN1F2xV5Y@postgres-crypto:5432/crypto_data?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-crypto
    restart: unless-stopped

  postgres-exporter-users:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-users
    environment:
      DATA_SOURCE_NAME: "postgresql://xplaincrypto:Ifr9eC7rtRMHZlIJ3kBzbqi2f@postgres-users:5432/user_data?sslmode=disable"
    ports:
      - "9188:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-users
    restart: unless-stopped

  postgres-exporter-fastapi:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: xplaincrypto-postgres-exporter-fastapi
    environment:
      DATA_SOURCE_NAME: "postgresql://fastapi:XJONccQ0vQ3JnwDT1bhi8Qfuy1inRwGP@postgres-fastapi:5432/operational_data?sslmode=disable"
    ports:
      - "9189:9187"
    networks:
      - xplaincrypto_network
    depends_on:
      - postgres-fastapi
    restart: unless-stopped

  # ====================
  # EXISTING INFRASTRUCTURE SERVICES
  # ====================

  # Redis (Shared Cache)
  redis:
    image: redis:7-alpine
    container_name: xplaincrypto-redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass redis_secure_pass_dev123
      --save 900 1
      --save 300 10
      --save 60 10000
      --dbfilename xplaincrypto-redis.rdb
      --dir /data
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_secure_pass_dev123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xplaincrypto_network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: xplaincrypto-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=grafana.xplaincrypto.ai
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    secrets:
      - grafana_admin_password
    depends_on:
      - prometheus
      - redis
    networks:
      - xplaincrypto_network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: xplaincrypto-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - postgres-exporter-crypto
      - postgres-exporter-users
      - postgres-exporter-fastapi
    networks:
      - xplaincrypto_network

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: xplaincrypto-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - xplaincrypto_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: xplaincrypto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grafana
      - prometheus
      - alertmanager
    networks:
      - xplaincrypto_network

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: xplaincrypto-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - xplaincrypto_network

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: xplaincrypto-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: redis_secure_pass_dev123
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - xplaincrypto_network

# ====================
# SECRETS CONFIGURATION - BANKING-GRADE SECURITY
# ====================

secrets:
  postgres_crypto_password:
    file: ./secrets/postgres_crypto_password.txt
  postgres_users_password:
    file: ./secrets/postgres_users_password.txt
  postgres_fastapi_password:
    file: ./secrets/postgres_fastapi_password.txt
  
  # Application Passwords
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

# ====================
# VOLUMES - FIXED CONFIGURATION  
# ====================

volumes:
  # Database Data
  postgres_crypto_data:
    driver: local
  postgres_users_data:
    driver: local
  postgres_fastapi_data:
    driver: local
  
  # Application Data
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local

# ====================
# NETWORKS
# ====================

networks:
  xplaincrypto_network:
    driver: bridge
    name: xplaincrypto_network 