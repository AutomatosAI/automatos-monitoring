server { 
  listen 443 ssl; 
  server_name prometheus.xplaincrypto.ai; 
 
  ssl_certificate /etc/letsencrypt/live/xplaincrypto.ai/fullchain.pem; 
  ssl_certificate_key /etc/letsencrypt/live/xplaincrypto.ai/privkey.pem; 
 
  location / { 
    proxy_pass http://localhost:9090/; 
    proxy_set_header Host $host; 
    proxy_set_header X-Real-IP $remote_addr; 
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
    proxy_set_header X-Forwarded-Proto $scheme; 
  } 
} 