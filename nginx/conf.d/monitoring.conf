# XplainCrypto Phase 1 Monitoring - Nginx Configuration

# Grafana Dashboard
upstream grafana {
    server grafana:3000;
}

# Prometheus Metrics
upstream prometheus {
    server prometheus:9090;
}

# AlertManager
upstream alertmanager {
    server alertmanager:9093;
}

# Grafana subdomain
server {
    listen 80;
    server_name grafana.xplaincrypto.ai;
    
    access_log /var/log/nginx/grafana.access.log;
    error_log /var/log/nginx/grafana.error.log;
    
    location / {
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for live dashboards
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Increase timeouts for long-running queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Prometheus subdomain
server {
    listen 80;
    server_name prometheus.xplaincrypto.ai;
    
    access_log /var/log/nginx/prometheus.access.log;
    error_log /var/log/nginx/prometheus.error.log;
    
    location / {
        proxy_pass http://prometheus;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for large metric queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# AlertManager subdomain
server {
    listen 80;
    server_name alerts.xplaincrypto.ai;
    
    access_log /var/log/nginx/alerts.access.log;
    error_log /var/log/nginx/alerts.error.log;
    
    location / {
        proxy_pass http://alertmanager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# Main monitoring hub (optional)
server {
    listen 80;
    server_name monitoring.xplaincrypto.ai;
    
    access_log /var/log/nginx/monitoring.access.log;
    error_log /var/log/nginx/monitoring.error.log;
    
    # Redirect to Grafana by default
    location / {
        return 301 http://grafana.xplaincrypto.ai$request_uri;
    }
    
    # Direct access to services
    location /grafana/ {
        rewrite ^/grafana/(.*)$ /$1 break;
        proxy_pass http://grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /prometheus/ {
        rewrite ^/prometheus/(.*)$ /$1 break;
        proxy_pass http://prometheus;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /alerts/ {
        rewrite ^/alerts/(.*)$ /$1 break;
        proxy_pass http://alertmanager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # System health check
    location /health {
        access_log off;
        return 200 "XplainCrypto Phase 1 Monitoring - healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Status page
    location /status {
        access_log off;
        return 200 '{"status":"healthy","phase":"Phase 1 Monitoring","services":["grafana","prometheus","alertmanager"],"timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }
} 