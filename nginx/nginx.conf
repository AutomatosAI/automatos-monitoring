events {
    worker_connections 1024;
}

http {
    # Basic Nginx configuration for XplainCrypto Infrastructure
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Basic settings
    sendfile on;
    keepalive_timeout 65;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # DNS resolver for dynamic container resolution
    resolver 127.0.0.11 valid=30s;
    
    # =========================================
    # XPLAINCRYPTO PLATFORM DNS ARCHITECTURE
    # ALL SERVICES ON SHARED NETWORK
    # =========================================
    
    # FastAPI API Backend
    server {
        listen 80;
        server_name api.xplaincrypto.ai;
        
        location / {
            set $fastapi_backend 142.93.49.20:8000;
            proxy_pass http://$fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # FastAPI specific headers
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_redirect off;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # Health check endpoint
        location /health {
            set $fastapi_backend xplaincrypto-fastapi:8000;
            proxy_pass http://$fastapi_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # API documentation (if enabled)
        location /docs {
            set $fastapi_backend xplaincrypto-fastapi:8000;
            proxy_pass http://$fastapi_backend/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /redoc {
            set $fastapi_backend xplaincrypto-fastapi:8000;
            proxy_pass http://$fastapi_backend/redoc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
    
    # MindsDB AI/ML Platform
    server {
        listen 80;
        server_name mindsdb.xplaincrypto.ai;
        
        location / {
            set $mindsdb_backend xplaincrypto-mindsdb:47334;
            proxy_pass http://$mindsdb_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # MindsDB specific settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
    
    # n8n Workflow Automation Platform (External Server)
    server {
        listen 80;
        server_name n8n.xplaincrypto.ai;
        
        location / {
            proxy_pass http://206.81.0.227:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # n8n WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
    
    # Grafana Monitoring Dashboard
    server {
        listen 80;
        server_name grafana.xplaincrypto.ai;
        
        location / {
            set $grafana_backend grafana:3000;
            proxy_pass http://$grafana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # Prometheus Metrics Collection
    server {
        listen 80;
        server_name prometheus.xplaincrypto.ai;
        
        location / {
            set $prometheus_backend prometheus:9090;
            proxy_pass http://$prometheus_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # AlertManager Notifications
    server {
        listen 80;
        server_name alerts.xplaincrypto.ai;
        
        location / {
            set $alertmanager_backend alertmanager:9093;
            proxy_pass http://$alertmanager_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # User Database Admin PgAdmin
    server {
        listen 80;
        server_name pgadmin.xplaincrypto.ai;
        
        location / {
            set $pgadmin_backend xplaincrypto-pgadmin-users:80;
            proxy_pass http://$pgadmin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # Main Website (Future Frontend)
    server {
        listen 80;
        server_name www.xplaincrypto.ai xplaincrypto.ai;
        
        location / {
            # Placeholder for future frontend application
            return 200 "XplainCrypto Platform - Coming Soon\nAPI: api.xplaincrypto.ai\nDashboard: grafana.xplaincrypto.ai\nAutomation: n8n.xplaincrypto.ai";
            add_header Content-Type text/plain;
        }
        
        location /health {
            access_log off;
            return 200 "XplainCrypto Platform Healthy\n";
            add_header Content-Type text/plain;
        }
    }
    
    # Default server (catch-all)
    server {
        listen 80 default_server;
        server_name _;
        
        location /health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }
        
        location / {
            return 404 "Service not found. Available services:\n- api.xplaincrypto.ai\n- mindsdb.xplaincrypto.ai\n- n8n.xplaincrypto.ai\n- grafana.xplaincrypto.ai\n- prometheus.xplaincrypto.ai\n- alerts.xplaincrypto.ai\n- pgadmin.xplaincrypto.ai";
            add_header Content-Type text/plain;
        }
    }
}
