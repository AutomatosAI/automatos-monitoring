apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus.railway.internal:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki.railway.internal:3100
    editable: false
    jsonData:
      maxLines: 1000
