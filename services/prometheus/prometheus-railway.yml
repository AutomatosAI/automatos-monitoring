# Prometheus config for Railway deployment
# Uses Railway private networking DNS: <service>.railway.internal
#
# Actual service names from Railway project "Automatos AI":
#   Backend API:  automatos-ai.railway.internal
#   PostgreSQL:   pgvector.railway.internal:5432
#   Redis:        redis.railway.internal:6379
#   Agent Worker: agent-opt-worker.railway.internal:8080

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "automatos"
    env: "production"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager.railway.internal:9093"

scrape_configs:
  # ─────────────────────────────────────────────
  # Automatos Application Services
  # ─────────────────────────────────────────────

  # Backend API health
  - job_name: "automatos-backend"
    metrics_path: /health
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["automatos-ai.railway.internal:8000"]
        labels:
          service: "backend"
          component: "api"

  # Agent Optimization Worker
  - job_name: "automatos-agent-worker"
    metrics_path: /health
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["agent-opt-worker.railway.internal:8080"]
        labels:
          service: "agent-worker"
          component: "worker"

  # ─────────────────────────────────────────────
  # Database Exporters
  # ─────────────────────────────────────────────

  - job_name: "postgres-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter.railway.internal:9187"]
        labels:
          service: "postgresql"
          database: "railway"

  - job_name: "redis-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter.railway.internal:9121"]
        labels:
          service: "redis"

  # ─────────────────────────────────────────────
  # Monitoring Stack Self-Monitoring
  # ─────────────────────────────────────────────

  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "loki"
    scrape_interval: 30s
    static_configs:
      - targets: ["loki.railway.internal:3100"]
        labels:
          service: "loki"

  - job_name: "alertmanager"
    scrape_interval: 30s
    static_configs:
      - targets: ["alertmanager.railway.internal:9093"]
        labels:
          service: "alertmanager"
