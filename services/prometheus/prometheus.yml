global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "automatos"
    env: "production"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # ─────────────────────────────────────────────
  # Automatos Application Services
  # ─────────────────────────────────────────────

  # Backend API health
  - job_name: "automatos-backend"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "backend"
          component: "api"

  # Workspace Worker health
  - job_name: "automatos-workspace-worker"
    metrics_path: /health
    scrape_interval: 30s
    static_configs:
      - targets: ["workspace-worker:8081"]
        labels:
          service: "workspace-worker"
          component: "worker"

  # ─────────────────────────────────────────────
  # Database Exporters
  # ─────────────────────────────────────────────

  - job_name: "postgres-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgresql"
          database: "orchestrator_db"

  - job_name: "redis-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # ─────────────────────────────────────────────
  # Monitoring Stack Self-Monitoring
  # ─────────────────────────────────────────────

  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "loki"
    scrape_interval: 30s
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"

  - job_name: "alertmanager"
    scrape_interval: 30s
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          service: "alertmanager"
