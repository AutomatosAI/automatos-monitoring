global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "automatos-default"

  routes:
    # Critical alerts — fast grouping, hourly repeat
    - match:
        severity: critical
      receiver: "automatos-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # Warning alerts — standard grouping
    - match:
        severity: warning
      receiver: "automatos-warning"
      group_wait: 60s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

    # Info alerts — slow grouping, infrequent repeat
    - match:
        severity: info
      receiver: "automatos-info"
      group_wait: 5m
      group_interval: 15m
      repeat_interval: 12h
      continue: false

inhibit_rules:
  # Critical service-down suppresses warning-level alerts for the same service
  - source_matchers:
      - severity="critical"
      - alertname=~".*Down"
    target_matchers:
      - severity="warning"
    equal: ["service"]

  # PostgreSQL down suppresses all database performance alerts
  - source_matchers:
      - alertname="PostgreSQLDown"
    target_matchers:
      - alertname=~"(HighConnections|SlowQueries|DeadTuples|CacheHitLow|DBSizeGrowth)"
    equal: ["service"]

  # Redis down suppresses all Redis performance alerts
  - source_matchers:
      - alertname="RedisDown"
    target_matchers:
      - alertname=~"(RedisHighMemory|RedisEvictedKeys|RedisHighLatency|RedisHighClients)"
    equal: ["service"]

receivers:
  - name: "automatos-default"
    webhook_configs:
      - url: "http://backend:8000/api/alerts/ingest"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/ingest-token
          headers:
            X-Alert-Source: "alertmanager"
            X-Alert-Priority: "default"

  - name: "automatos-critical"
    webhook_configs:
      - url: "http://backend:8000/api/alerts/ingest"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/ingest-token
          headers:
            X-Alert-Source: "alertmanager"
            X-Alert-Priority: "critical"

  - name: "automatos-warning"
    webhook_configs:
      - url: "http://backend:8000/api/alerts/ingest"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/ingest-token
          headers:
            X-Alert-Source: "alertmanager"
            X-Alert-Priority: "warning"

  - name: "automatos-info"
    webhook_configs:
      - url: "http://backend:8000/api/alerts/ingest"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /etc/alertmanager/secrets/ingest-token
          headers:
            X-Alert-Source: "alertmanager"
            X-Alert-Priority: "info"
